services:
  ronda-smart:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ronda-smart
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3100
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/login >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
